name: CD

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      REGION: ${{ secrets.GCP_REGION }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      IMAGE_NAME: birdbase-api
      ARTIFACT_REPO: birdbase-api
      SERVICE_NAME: birdbase-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=elt-birdbase/main"

      - name: Import existing resources (idempotent)
        working-directory: infra
        run: |
          import_resource() {
            local addr="$1"
            local id="$2"
            if ! terraform state show "$addr" > /dev/null 2>&1; then
              echo "Importing $addr ..."
              terraform import -var-file=envs/main.tfvars -var image_tag=${GITHUB_SHA} "$addr" "$id" || true
            else
              echo "Already in state: $addr"
            fi
          }

          # APIs
          import_resource 'google_project_service.required["artifactregistry.googleapis.com"]' "${PROJECT_ID}/artifactregistry.googleapis.com"
          import_resource 'google_project_service.required["run.googleapis.com"]' "${PROJECT_ID}/run.googleapis.com"
          import_resource 'google_project_service.required["iam.googleapis.com"]' "${PROJECT_ID}/iam.googleapis.com"
          import_resource 'google_project_service.required["iamcredentials.googleapis.com"]' "${PROJECT_ID}/iamcredentials.googleapis.com"
          import_resource 'google_project_service.required["cloudbuild.googleapis.com"]' "${PROJECT_ID}/cloudbuild.googleapis.com"

          # Artifact Registry
          import_resource 'google_artifact_registry_repository.app' "projects/${PROJECT_ID}/locations/${REGION}/repositories/birdbase-api"

          # Service Accounts
          import_resource 'google_service_account.runtime' "projects/${PROJECT_ID}/serviceAccounts/cloud-run-runtime@${PROJECT_ID}.iam.gserviceaccount.com"
          import_resource 'google_service_account.deployer' "projects/${PROJECT_ID}/serviceAccounts/github-actions-deployer@${PROJECT_ID}.iam.gserviceaccount.com"

          # WIF
          import_resource 'google_iam_workload_identity_pool.github' "projects/${PROJECT_ID}/locations/global/workloadIdentityPools/github-pool"
          import_resource 'google_iam_workload_identity_pool_provider.github' "projects/${PROJECT_ID}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"

          # GCS Buckets
          import_resource 'google_storage_bucket.database' "birdbase-database"
          import_resource 'google_storage_bucket.birds_of_the_world' "birdbase-birds-of-the-world"

      - name: Terraform apply (infra base)
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -target=google_project_service.required \
            -target=google_artifact_registry_repository.app \
            -var-file=envs/main.tfvars

      - name: Build & push image
        run: |
          docker build -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${IMAGE_NAME}:${GITHUB_SHA} .
          docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${IMAGE_NAME}:${GITHUB_SHA}

      - name: Terraform apply (deploy)
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var-file=envs/main.tfvars \
            -var image_tag=${GITHUB_SHA}
